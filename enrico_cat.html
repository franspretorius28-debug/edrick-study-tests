    .answerResult{border-radius:18px;padding:12px;font-weight:800}

    .answerResult.bad{background:var(--bad);color:#7f1d1d;border:1px solid var(--badLine)}

      .topbar .row{align-items:stretch}
      .topbar .btn{flex:1}
      h1{font-size:24px}
      h2{font-size:21px}

  </style>
</head>

// === TEAE_WRITTEN_ANSWERS_V1 ===
function teaeAnswerText(q){
  if(!q) return "";
  if(q.o && typeof q.a === "number") return q.o[q.a] || "";
  if(q.options && typeof q.answer === "number") return q.options[q.answer] || "";
  return q.answerText || q.correct || "";
}
function teaeNormAnswer(v){
  return String(v || "")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[’']/g,"")
    .replace(/[^a-z0-9]+/g," ")
    .trim();
}
function teaeAnswerTokens(v){
  const stop = {
    "die":1,"en":1,"of":1,"om":1,"te":1,"is":1,"n":1,"a":1,"the":1,"to":1,"and":1,"or":1,
    "van":1,"wat":1,"word":1,"gebruik":1,"used":1,"for":1,"with":1,"in":1,"on":1,"by":1
  };
  return teaeNormAnswer(v).split(" ").filter(function(x){ return x.length > 2 && !stop[x]; });
}
function teaeWrittenCorrect(q, val){
  const user = teaeNormAnswer(val);
  const ans = teaeNormAnswer(teaeAnswerText(q));
  if(!user) return false;
  if(user === ans) return true;
  if(ans && user.indexOf(ans) >= 0) return true;

  const tokens = teaeAnswerTokens(teaeAnswerText(q));
  if(tokens.length === 0) return false;

  let hits = 0;
  tokens.forEach(function(t){
    if(user.indexOf(t) >= 0) hits++;
  });

  if(tokens.length <= 2) return hits === tokens.length;
  return hits >= Math.max(2, Math.ceil(tokens.length * 0.55));
}
function teaeSetWritten(bucket, key, val){
  if(!state[bucket]) state[bucket] = {};
  state[bucket][key] = val;
  save();
}
function teaeWrittenAnswerHTML(bucket, key, q, reveal, explanation, visualHtml){
  const val = ((state[bucket] || {})[key] || "");
  const correctText = teaeAnswerText(q);
  const ok = teaeWrittenCorrect(q, val);
  let html = '<div class="questionBox">' + (visualHtml || "") + '<b>' + esc(q.q) + '</b>';
  html += '<div class="writtenAnswerBox">';
  html += '<input class="writtenInput" value="' + esc(val) + '" placeholder="Tik jou antwoord hier, nie A/B/C/D nie..." oninput="teaeSetWritten(\'' + bucket + '\',\'' + key + '\',this.value)">';
  if(reveal){
    html += '<div class="answerResult ' + (ok ? 'good' : 'bad') + '">' + (ok ? '✅ Reg' : '❌ Nog nie reg nie') + '</div>';
    html += '<div class="note"><b>Regte antwoord:</b> ' + esc(correctText) + '</div>';
    if(explanation) html += '<div class="note"><b>Verduideliking:</b> ' + esc(explanation) + '</div>';
  }
  html += '</div></div>';
  return html;
}



function moduleLabel(module){
  const labels = {
    controls: "Vehicle Controls",
    defensive: "Defensive Driving",
    signs: "Road Signs",
    markings: "Road Markings",
    rules: "Rules of the Road",
    overview: "Overview"
  };
  return labels[module] || module || "General";
}
function calculateWeakAreas(wrongQuestionsList){
  const counts = {};
  wrongQuestionsList.forEach(q=>{
    const label = moduleLabel(q.module);
    counts[label] = (counts[label] || 0) + 1;
  });
  return Object.entries(counts)
    .sort((a,b)=>b[1]-a[1])
    .map(([k,v])=>`${k} (${v})`)
    .join(", ");
}
function sendResultToParent(payload){
  if(!RESULTS_WEB_APP_URL || RESULTS_WEB_APP_URL.indexOf("script.google.com") === -1){
    state.lastSyncStatus = "Results URL not configured";
    save();
    return;
  }
  state.lastSyncStatus = "Sending result...";
  save();
  fetch(RESULTS_WEB_APP_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {"Content-Type": "text/plain;charset=utf-8"},
    body: JSON.stringify(payload)
  }).then(()=>{
    state.lastSyncStatus = "Result sent to parent sheet";
    save();
    render();
  }).catch((err)=>{
    state.lastSyncStatus = "Could not send result. It is saved on this device.";
    save();
    render();
  });
}

function saveExamResult(){
  const eq = examQuestions();
  const score = examScore();
  const pct = eq.length ? Math.round(score / eq.length * 100) : 0;
  const wrongItems = [];
  const wrongKeys = [];
  eq.forEach((q,i)=>{
    if(state.examAnswers[i] !== q.answer){
      const key = q.id || q.q;
      state.wrongBank[key] = q;
      wrongKeys.push(key);
      wrongItems.push(q);
    }
  });
  const weakAreas = calculateWeakAreas(wrongItems);
  const wrongQuestionsText = wrongItems
    .slice(0, 40)
    .map(q => `[${moduleLabel(q.module)}] ${q.q} | Correct: ${q.options[q.answer]}`)
    .join("\n");

  const result = {
    date: new Date().toLocaleString(),
    score,
    total: eq.length,
    percent: pct,
    passed: pct >= 75,
    wrong: wrongItems.length,
    weakAreas
  };
  state.scoreHistory = [result, ...(state.scoreHistory || [])].slice(0, 20);
  state.lastSyncStatus = "Saved locally. Sending to parent sheet...";
  save();

  sendResultToParent({
    student: state.student || "Enrico",
    subject: "K53",
    mode: "Exam",
    score,
    total: eq.length,
    percent: pct,
    passed: pct >= 75,
    wrongCount: wrongItems.length,
    weakAreas: weakAreas || "None",
    wrongQuestions: wrongQuestionsText || "None",
    device: navigator.userAgent || ""
  });
}

function resultPercent(result){
  if(!result) return null;
  if(typeof result.percent === "number") return result.percent;

  if(typeof result.score === "number" && typeof result.total === "number" && result.total > 0){
    return Math.round((result.score / result.total) * 100);
  }
  return null;
}

function questionHTML(q,i){
  const key=`${state.quizMode}-${i}`; const chosen=state.answers[key]; const reveal=state.showAnswers||state.parentMode;
  return `<div class="questionBox">${imageHTML(q)}<b>${i+1}. ${esc(q.q)}</b><div class="optionGrid" style="margin-top:12px">
    ${q.options.map((o,oi)=>{
      let cls="optionBtn";
      if(chosen===oi && !reveal) cls+=" selected";
      if(reveal && q.answer===oi) cls+=" correct";
      if(reveal && chosen===oi && q.answer!==oi) cls+=" wrong";
      return `<button class="${cls}" onclick="choosePractice(${i},${oi})">${String.fromCharCode(65+oi)}. ${esc(o)}</button>`;
    }).join("")}
  </div>${reveal?`<div class="note" style="margin-top:12px"><b>Explanation:</b> ${esc(q.why)}</div>`:""}</div>`;
}
function examHTML(){

  return `${topbar()}<div class="wrap"><div class="card">
    <div class="row space"><div><h2>🏆 K53 Exam Mode</h2><p class="muted">One question at a time, timer, finish button, score and saved wrong questions.</p></div>

    </div>
    ${!state.examStarted?`<div class="note" style="margin-top:14px"><b>Instructions:</b><br>Read each question carefully. Choose only one answer. When you are done, click Finish to see your score.</div>`:""}
    ${state.examStarted && q && !state.examFinished ? `<div class="grid" style="margin-top:14px">
      <div class="examHeader"><b>Question ${state.examIndex+1} of ${eq.length}</b><b>Answered: ${Object.keys(state.examAnswers).length}/${eq.length}</b><div class="timer">${fmtTime(state.examSecondsLeft)}</div></div>
      <div class="questionBox">${imageHTML(q)}<h2>${esc(q.q)}</h2><div class="optionGrid" style="margin-top:14px">${q.options.map((o,oi)=>`<button class="optionBtn ${state.examAnswers[state.examIndex]===oi?'selected':''}" onclick="chooseExam(${oi})">${String.fromCharCode(65+oi)}. ${esc(o)}</button>`).join("")}</div></div>
      <div class="row space"><button class="btn secondary" ${state.examIndex===0?'disabled':''} onclick="setState({examIndex:Math.max(0,state.examIndex-1)})">Previous</button>${state.examIndex<eq.length-1?`<button class="btn" onclick="setState({examIndex:Math.min(${eq.length-1},state.examIndex+1)})">Next</button>`:`<button class="btn" onclick="finishExam()">Finish Exam</button>`}</div>
    </div>`:""}
    ${state.examStarted && state.examFinished ? `<div class="grid" style="margin-top:14px">
      <div class="card ${passed?'resultGood':'resultBad'}" style="text-align:center"><div style="font-size:42px;font-weight:900">${score}/${eq.length}</div><h2>${pct}% — ${passed?"PASS":"TRY AGAIN"}</h2><p>K53 practice score. Each exam randomly selects 64 questions from the larger practice bank.</p><div class="syncBox" style="margin-top:12px"><b>Parent result sync:</b> ${state.lastSyncStatus || "Not sent yet"}</div></div>
      ${eq.map((qq,i)=>{
        const chosen=state.examAnswers[i]; const correct=chosen===qq.answer;
        return `<div class="questionBox ${correct?'resultGood':'resultBad'}">${imageHTML(qq)}<b>${i+1}. ${esc(qq.q)}</b><div>Your answer: ${chosen===undefined?"None":`${String.fromCharCode(65+chosen)}. ${esc(qq.options[chosen])}`}</div>${!correct?`<div><b>Correct answer:</b> ${String.fromCharCode(65+qq.answer)}. ${esc(qq.options[qq.answer])}</div>`:""}<div class="muted">${esc(qq.why)}</div></div>`;
      }).join("")}
    </div>`:""}
  </div></div>`;
}

function catTaskKey(idx){ return "catTask_" + idx; }

function catTaskState(idx){
  if(!state.catTaskProgress) state.catTaskProgress = {};
  const key = catTaskKey(idx);
  if(!state.catTaskProgress[key]){
    state.catTaskProgress[key] = {steps:{}, status:"Not started", note:""};
  }
  return state.catTaskProgress[key];
}

function catToggleTaskStep(idx, stepIdx){
  const t = catTaskState(idx);
  t.steps[stepIdx] = !t.steps[stepIdx];
  const task = catQ2Tasks[idx];
  const doneCount = Object.values(t.steps).filter(Boolean).length;
  if(doneCount === 0) t.status = "Not started";
  else if(doneCount < task.steps.length) t.status = "Busy";
  else t.status = "Completed";
  save(); render();
}

function catSetTaskStatus(idx, status){
  const t = catTaskState(idx);
  t.status = status;
  t.reviewedAt = new Date().toLocaleString();
  save(); render();

  if(status === "Parent approved" || status === "Needs fix"){
    const task = catQ2Tasks[idx];
    const doneCount = Object.values(t.steps || {}).filter(Boolean).length;
    sendResultToParent({
      student: state.student || "Enrico",
      subject: "RTT / CAT",
      mode: "Practical Task",
      task: task.title,
      module: task.module,
      status: status,
      score: doneCount,
      total: task.steps.length,
      percent: Math.round(doneCount / task.steps.length * 100),
      passed: status === "Parent approved",
      wrongCount: status === "Needs fix" ? 1 : 0,
      weakAreas: status === "Needs fix" ? task.module : "None",
      wrongQuestions: status === "Needs fix" ? "Practical task needs correction: " + task.title : "None",
      device: navigator.userAgent || ""
    });
  }
}

function catTaskStatusClass(status){
  if(status === "Parent approved") return "active";
  if(status === "Needs fix") return "";
  if(status === "Completed") return "active";
  return "";
}

function catTaskModuleId(task){

  if(task.module.indexOf("2.1") === 0) return "m21";

  if(rttExamTimerHandleV2) return;
  rttExamTimerHandleV2 = setInterval(function(){
    if(state.rttExamFinished){
      clearInterval(rttExamTimerHandleV2);
      rttExamTimerHandleV2 = null;

    if(typeof state.rttExamSecondsLeft !== "number") state.rttExamSecondsLeft = 60 * 60;

      rttExamTimerHandleV2 = null;
      finishRttExam();

  }, 1000);
}

// === RTT EXAM REVIEW + WEAK AREAS V1 ===
function catModuleTitleById(id){
  const mod = catQ2Modules.find(function(m){ return m.id === id; });
  return mod ? (mod.badge + " " + mod.title) : id;
}

function rttExamReviewData(){
  const qs = rttExamQuestions();
  const wrong = [];
  const moduleStats = {};

  qs.forEach(function(q,i){
    const chosen = (state.rttExamAnswers || {})[i];
    if(!moduleStats[q.m]) moduleStats[q.m] = {total:0, wrong:0};
    moduleStats[q.m].total++;

    if(!teaeWrittenCorrectAny(q, chosen)){
      moduleStats[q.m].wrong++;
      wrong.push({
        number:i+1,
        module:q.m,
        question:q.q,
        chosen: chosen ? chosen : "Nie beantwoord nie",
        correct:teaeCorrectTextAny(q),
        explanation:q.w
      });
    }
  });

  const weak = Object.keys(moduleStats)
    .map(function(id){
      return {
        id:id,
        title:catModuleTitleById(id),
        wrong:moduleStats[id].wrong,
        total:moduleStats[id].total
      };
    })
    .filter(function(x){ return x.wrong > 0; })
    .sort(function(a,b){ return b.wrong - a.wrong; });

  return {wrong:wrong, weak:weak};
}

function rttExamReviewHTML(){
  if(!state.rttExamFinished) return "";

  const data = rttExamReviewData();
  let html = "";

  html += '<div class="card"><div class="row space"><div><h2>Exam Review</h2><p class="muted">Kyk waar Enrico punte verloor het en watter modules hy weer moet oefen.</p></div><span class="pill active">' + data.wrong.length + ' verkeerd</span></div>';

  if(data.weak.length){
    html += '<h3 style="margin-top:14px">Weak Areas</h3>';
    html += '<div class="grid subjects" style="margin-top:12px">';
    data.weak.forEach(function(w){
      const pct = Math.round(((w.total - w.wrong) / w.total) * 100);
      html += '<div class="smallStat"><b>' + w.wrong + '/' + w.total + ' verkeerd</b><span>' + esc(w.title) + '</span><br><span class="muted">' + pct + '% reg</span></div>';
    });
    html += '</div>';
  } else {
    html += '<div class="note" style="margin-top:12px">Mooi! Geen teorie vrae verkeerd nie.</div>';
  }

  if(data.wrong.length){
    html += '<h3 style="margin-top:18px">Verkeerde vrae</h3>';
    html += '<div class="grid" style="margin-top:12px">';
    data.wrong.forEach(function(w){
      html += '<div class="questionBox">';
      html += '<b>Vraag ' + w.number + ': ' + esc(w.question) + '</b>';
      html += '<div class="note" style="margin-top:10px"><b>Module:</b> ' + esc(catModuleTitleById(w.module)) + '</div>';
      html += '<div class="note" style="margin-top:8px"><b>Enrico se antwoord:</b> ' + esc(w.chosen) + '</div>';
      html += '<div class="note" style="margin-top:8px"><b>Regte antwoord:</b> ' + esc(w.correct) + '</div>';
      html += '<div class="note" style="margin-top:8px"><b>Verduideliking:</b> ' + esc(w.explanation) + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function excelExpectedFormula(row){ return excelFormulaHint(row); }

function excelNum(v){
  const n = parseFloat(String(v || "").replace(",", "."));
  return isNaN(n) ? 0 : n;
}

function excelRowTotal(row){
  const e = ensureExcelSim();
  const b = excelNum(e.rows[row].qty);
  const c = excelNum(e.rows[row].price);
  return excelFormulaSymbol() === "+" ? (b + c) : (b * c);
}

function excelGrandTotal(){
  const e = ensureExcelSim();
  let total = 0;
  e.rows.forEach(function(r,i){ total += excelRowTotal(i); });
  return total;
}

function excelAverage(){
  const e = ensureExcelSim();
  return e.rows.length ? excelGrandTotal() / e.rows.length : 0;
}

function excelMax(){
  const e = ensureExcelSim();
  let max = 0;
  e.rows.forEach(function(r,i){ max = Math.max(max, excelRowTotal(i)); });

}

function wordEnsureTableCells(){
  const w = ensureWordSim();
  if(!w.tableCells){
    w.tableCells = [
      ["", "", ""],
      ["", "", ""],
      ["", "", ""],
      ["", "", ""]
    ];
  }
  return w.tableCells;
}

function wordTableSet(r, c, value){
  const w = ensureWordSim();
  wordEnsureTableCells();
  w.tableCells[r][c] = value;
  w.marked = false;
  save();
}

function wordTableCell(r, c){
  const cells = wordEnsureTableCells();
  return cells[r] && cells[r][c] ? cells[r][c] : "";
}

function wordTableHasContent(){
  const cells = wordEnsureTableCells();
  let count = 0;
  cells.forEach(function(row){
    row.forEach(function(cell){
      if(String(cell || "").trim().length > 0) count++;
    });
  });
  return count >= 4;
}

function wordEditableTableHTML(){
  wordEnsureTableCells();
  let html = '<table class="wordFakeTable editableWordTable">';
  for(let r=0; r<4; r++){
    html += '<tr>';
    for(let c=0; c<3; c++){
      const tag = r === 0 ? "th" : "td";
      const ph = r === 0 ? (c === 0 ? "Item" : c === 1 ? "Type" : "Example") : "";
      html += '<' + tag + '><input class="wordTableInput" placeholder="' + ph + '" value="' + esc(wordTableCell(r,c)) + '" oninput="wordTableSet(' + r + ',' + c + ',this.value)"></' + tag + '>';
    }
    html += '</tr>';
  }
  html += '</table>';
  return html;
}
// Override marking so table practicals must have table content
function wordSimResult(){
  const w = ensureWordSim();
  const task = (typeof currentWordTaskV2 === "function") ? currentWordTaskV2() : null;
  const taskId = task ? task.id : "";

  const needsTable = taskId === "word_table" || taskId === "word_hardware_software" || taskId === "word_mixed_exam";
  const needsColumns = taskId === "word_columns";
  const needsLandscape = taskId === "word_landscape";

  const checks = [
    {ok: w.title.trim().length >= 5, text:"Opskrif is ingevul"},
    {ok: w.boldHeading, text:"Opskrif is bold gemaak"},
    {ok: w.centeredHeading || taskId === "word_columns" || taskId === "word_landscape", text:"Opskrif is gesentreer waar nodig"},
    {ok: w.body.trim().length >= 80, text:"Minstens twee kort paragrawe is ingevul"},
    {ok: w.header.trim().length >= 3, text:"Header is ingevul"},
    {ok: w.footer.trim().length >= 3 || w.pageNumbers, text:"Footer of page number is ingevul"}
  ];

  if(needsTable){
    checks.push({ok: !!w.table, text:"Table is inserted"});
    checks.push({ok: !!w.table && wordTableHasContent(), text:"Table is ingevul"});
  } else if(needsColumns){
    checks.push({ok: !!w.columns, text:"Columns is gebruik"});
  } else if(needsLandscape){
    checks.push({ok: !!w.landscape, text:"Landscape orientation is gebruik"});
  } else {
    checks.push({ok: w.landscape || w.columns || w.table, text:"Minstens een gevorderde Word-funksie is gebruik"});
  }

  const score = checks.filter(function(c){ return c.ok; }).length;
  const total = checks.length;
  const percent = Math.round(score / total * 100);
  return {
    checks: checks,
    score: score,
    total: total,
    percent: percent,
    passed: percent >= 70,
    missing: checks.filter(function(c){ return !c.ok; }).map(function(c){ return c.text; })
  };
}

function agriMakeQuestion(id, m, unit, type, q, correct, wrongList, explain){
  const opts = [correct].concat(wrongList || []);
  return {id:id, m:m, unit:unit, type:type, q:q, o:opts, a:0, w:explain};
}

function agriBuildQuestions(){
  const out = [];
  let n = 1;

  agriQuestionTopics.forEach(function(topic){
    topic.terms.forEach(function(t){
      const wrong = t.wrong || ["verkeerde antwoord","nie van toepassing","onvolledig"];
      out.push(agriMakeQuestion("agri_" + n++, topic.m, topic.unit, "mcq",
        "Wat beteken " + t.term + "?",
        t.def, wrong,
        t.term + " beteken: " + t.def + "."
      ));

      out.push(agriMakeQuestion("agri_" + n++, topic.m, topic.unit, "term",
        "Kies die regte term vir: " + t.def + ".",
        t.term, wrong,
        "Die regte term is " + t.term + "."
      ));

      out.push(agriMakeQuestion("agri_" + n++, topic.m, topic.unit, "waar/onwaar",
        "Waar of onwaar: " + t.term + " hou verband met " + topic.unitTitle + ".",
        "Waar", ["Onwaar", "Net soms", "Nie genoeg inligting nie"],
        "Dit is waar. Die term val onder " + topic.unitTitle + "."
      ));
    });
  });

  const extras = [
    {m:"m3", unit:"M3E1", q:"Watter hulpbronne is die belangrikste vir plantproduksie?", c:"Grond, water, sonlig, lug en voedingstowwe", w:["Slegs geld","Slegs trekkers","Slegs verpakking"], e:"Plantproduksie benodig natuurlike hulpbronne soos grond, water, lig en lug."},

    {m:"m4", unit:"M4E1", q:"Watter gronddeel hou gewoonlik die meeste water?", c:"Klei", w:["Growwe sand","Grondlug","Klippe"], e:"Klei het baie klein deeltjies en hou water goed."},

    {m:"m4", unit:"M4E2", q:"Hoe ontstaan sekondêre minerale?", c:"Deur verwering en verandering van primêre minerale", w:["Deur dokumente te print","Deur water heeltemal te verwyder","Deur grond te verf"], e:"Sekondêre minerale vorm uit veranderde primêre minerale."},

  return out;
}

var agriExamTimerHandle = null;

function startAgriExam(){
  state.selectedSubject = "agri";

  state.agriExamFinished = false;
  state.agriExamAnswers = {};
  state.agriExamSet = shuffleQuestions(agriQuestions).slice(0, Math.min(60, agriQuestions.length));
  state.agriExamSecondsLeft = 60 * 60;
  save();
  startAgriExamTimer();
  render();
}

function agriExamQuestions(){
  if(state.agriExamSet && state.agriExamSet.length) return state.agriExamSet;
  state.agriExamSet = shuffleQuestions(agriQuestions).slice(0, Math.min(60, agriQuestions.length));
  return state.agriExamSet;
}

function agriExamTimeText(){
  const s = typeof state.agriExamSecondsLeft === "number" ? state.agriExamSecondsLeft : 60 * 60;
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2,"0") + ":" + String(sec).padStart(2,"0");
}

function startAgriExamTimer(){
  if(agriExamTimerHandle) return;
  agriExamTimerHandle = setInterval(function(){
    if(state.screen !== "agri_exam" || state.agriExamFinished){
      clearInterval(agriExamTimerHandle);
      agriExamTimerHandle = null;
      return;
    }
    if(typeof state.agriExamSecondsLeft !== "number") state.agriExamSecondsLeft = 60 * 60;
    state.agriExamSecondsLeft = Math.max(0, state.agriExamSecondsLeft - 1);
    if(state.agriExamSecondsLeft <= 0){
      state.agriExamFinished = true;
      clearInterval(agriExamTimerHandle);
      agriExamTimerHandle = null;
    }
    save();
    render();
  }, 1000);
}

function agriExamChoose(i, oi){

// === AGRI PATCH 5: WEAK AREAS + RESULT HISTORY ===
function agriUnitTitle(unit){
  if(typeof agriQuestionTopics !== "undefined"){
    const topic = agriQuestionTopics.find(function(t){ return t.unit === unit; });
    if(topic) return topic.unitTitle;
  }
  if(unit === "M3E1") return "Eenheid 1: Landbouhulpbronne";
  if(unit === "M3E2") return "Eenheid 2: Grondbewaring en -bestuur";
  if(unit === "M3E3") return "Eenheid 3: Waterbestuur";
  if(unit === "M3E4") return "Eenheid 4: Landboubesoedeling";
  if(unit === "M3R") return "Module 3 Opsomming en Hersiening";
  if(unit === "M4E1") return "Eenheid 1: Basiese komponente van grond";
  if(unit === "M4E2") return "Eenheid 2: Primere en sekondere minerale";
  if(unit === "M4E3") return "Eenheid 3: Die vorming van rotse";
  return unit || "Onbekend";
}

function agriExamReviewData(){
  const qs = agriExamQuestions();
  const wrong = [];
  const stats = {};

  qs.forEach(function(q,i){
    const unit = q.unit || q.m || "unknown";
    const chosen = (state.agriExamAnswers || {})[i];

    if(!stats[unit]) stats[unit] = {unit:unit,total:0,wrong:0};
    stats[unit].total++;

    if(!teaeWrittenCorrectAny(q, chosen)){
      stats[unit].wrong++;
      wrong.push({
        number:i+1,
        unit:unit,
        unitTitle:agriUnitTitle(unit),
        question:q.q,
        chosen: chosen ? chosen : "Nie beantwoord nie",
        correct:teaeCorrectTextAny(q),
        explanation:q.w
      });
    }
  });

  const weak = Object.keys(stats).map(function(k){
    const x = stats[k];
    return {
      unit:x.unit,
      title:agriUnitTitle(x.unit),
      wrong:x.wrong,
      total:x.total,
      percent:x.total ? Math.round(((x.total - x.wrong) / x.total) * 100) : 0
    };
  }).filter(function(x){
    return x.wrong > 0;
  }).sort(function(a,b){
    return b.wrong - a.wrong;
  });

  return {wrong:wrong, weak:weak};
}

function agriSaveExamHistory(){
  const qs = agriExamQuestions();
  const score = agriExamScore();
  const pct = qs.length ? Math.round(score / qs.length * 100) : 0;
  const review = agriExamReviewData();

  if(!state.agriHistory) state.agriHistory = [];
  state.agriHistory.unshift({
    date:new Date().toLocaleString(),
    score:score,
    total:qs.length,
    percent:pct,
    passed:pct >= 70,
    weak:review.weak.slice(0,5),
    wrongCount:qs.length - score
  });
  state.agriHistory = state.agriHistory.slice(0,10);

  state.agriLastWeak = review.weak;
  state.agriLastWrong = review.wrong.slice(0,20);
}

    }
    html += '</div>';
  });
  html += '</div></div>';
  return html;
}

function agriPracticalState(){
  if(!state.agriPracticals) state.agriPracticals = {};
  return state.agriPracticals;
}

function agriCurrentPractical(){
  if(!state.agriPracticalId) state.agriPracticalId = agriPracticalTasks[0].id;
  return agriPracticalTasks.find(function(t){ return t.id === state.agriPracticalId; }) || agriPracticalTasks[0];
}

function agriChoosePractical(id){
  state.agriPracticalId = id;
  save();
  render();
}

function agriPracticalAnswer(taskId, idx){
  const p = agriPracticalState();
  if(!p[taskId]) p[taskId] = {answers:{}, marked:false};
  return p[taskId].answers[idx] || "";
}

function agriSetPracticalAnswer(taskId, idx, value){
  const p = agriPracticalState();
  if(!p[taskId]) p[taskId] = {answers:{}, marked:false};
  p[taskId].answers[idx] = value;
  p[taskId].marked = false;
  save();
}

function agriPracticalResult(task){
  const p = agriPracticalState();
  const saved = p[task.id] || {answers:{}};
  const joined = task.prompts.map(function(x,i){ return saved.answers[i] || ""; }).join(" ").toLowerCase();
  const wordCount = joined.split(/\s+/).filter(function(x){ return x.trim().length > 0; }).length;
  const keywordHits = task.keywords.filter(function(k){ return joined.indexOf(k.toLowerCase()) >= 0; }).length;

  const checks = [
    {ok: wordCount >= 35, text:"Antwoorde is volledig genoeg"},
    {ok: keywordHits >= 3, text:"Gebruik minstens 3 belangrike vakterme"},
    {ok: task.prompts.every(function(x,i){ return String(saved.answers[i] || "").trim().length >= 15; }), text:"Elke vraag is beantwoord"},
    {ok: joined.indexOf("hoekom") >= 0 || joined.indexOf("omdat") >= 0 || joined.indexOf("want") >= 0 || joined.indexOf("verduidelik") >= 0, text:"Antwoord gee redes/verduideliking"}
  ];

  const score = checks.filter(function(c){ return c.ok; }).length;
  return {
    checks:checks,
    score:score,
    total:checks.length,
    percent:Math.round(score / checks.length * 100),
    passed:score >= 3,
    wordCount:wordCount,
    keywordHits:keywordHits
  };
}

function agriMarkPractical(){
  const task = agriCurrentPractical();
  const p = agriPracticalState();
  if(!p[task.id]) p[task.id] = {answers:{}, marked:false};
  p[task.id].marked = true;
  save();
  render();
}

function agriResetPractical(){
  const task = agriCurrentPractical();
  const p = agriPracticalState();
  p[task.id] = {answers:{}, marked:false};
  save();
  render();
}

function mathlitScore(qsOverride){

  const mod = state.mathlitModule || "ml4";
  let score = 0;

    if(mathlitWrittenCorrect(q, (state.mathlitAnswers || {})[mod + "-" + i])) score++;
  });
  return score;
}

function mathlitShuffle(arr){
  const copy = arr.slice();
  for(let i = copy.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = copy[i];
    copy[i] = copy[j];
    copy[j] = tmp;
  }
  return copy;
}

var mathlitExamTimerHandle = null;

function startMathlitExam(){
  state.selectedSubject = "mathlit";
  state.screen = "mathlit_exam";
  state.mathlitExamFinished = false;
  state.mathlitExamAnswers = {};
  state.mathlitExamSet = mathlitShuffle(mathlitQuestions).slice(0, Math.min(15, mathlitQuestions.length));
  state.mathlitExamSecondsLeft = 60 * 60;
  save();
  startMathlitExamTimer();
  render();
}

function mathlitExamQuestions(){
  if(state.mathlitExamSet && state.mathlitExamSet.length) return state.mathlitExamSet;
  state.mathlitExamSet = mathlitShuffle(mathlitQuestions).slice(0, Math.min(15, mathlitQuestions.length));
  return state.mathlitExamSet;
}

function mathlitExamTimeText(){
  const s = typeof state.mathlitExamSecondsLeft === "number" ? state.mathlitExamSecondsLeft : 60 * 60;
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2,"0") + ":" + String(sec).padStart(2,"0");
}

function startMathlitExamTimer(){
  if(mathlitExamTimerHandle) return;
  mathlitExamTimerHandle = setInterval(function(){
    if(state.screen !== "mathlit_exam" || state.mathlitExamFinished){
      clearInterval(mathlitExamTimerHandle);
      mathlitExamTimerHandle = null;
      return;
    }
    if(typeof state.mathlitExamSecondsLeft !== "number") state.mathlitExamSecondsLeft = 60 * 60;
    state.mathlitExamSecondsLeft = Math.max(0, state.mathlitExamSecondsLeft - 1);
    if(state.mathlitExamSecondsLeft <= 0){
      finishMathlitExam();
      return;
    }
    save();
    render();
  }, 1000);
}

function mathlitExamChoose(i, oi){
  if(!state.mathlitExamAnswers) state.mathlitExamAnswers = {};
  state.mathlitExamAnswers[i] = oi;
  save();
  render();
}

function mathlitExamScore(){
  const qs = mathlitExamQuestions();
  let score = 0;
  qs.forEach(function(q,i){
    if(mathlitWrittenCorrect(q, (state.mathlitExamAnswers || {})[i])) score++;
  });
  return score;
}

function mathlitUnitTitle(unit){
  const t = (typeof mathlitQuestionTopics !== "undefined") ? mathlitQuestionTopics.find(function(x){ return x.unit === unit; }) : null;
  return t ? t.unitTitle : (unit || "Onbekend");
}

function mathlitExamReviewData(){
  const qs = mathlitExamQuestions();
  const wrong = [];
  const stats = {};

  qs.forEach(function(q,i){
    const unit = q.unit || q.m || "unknown";
    const chosen = (state.mathlitExamAnswers || {})[i];
    if(!stats[unit]) stats[unit] = {unit:unit,total:0,wrong:0};
    stats[unit].total++;

    if(!mathlitWrittenCorrect(q, chosen)){
      stats[unit].wrong++;
      wrong.push({
        number:i+1,
        unit:unit,
        unitTitle:mathlitUnitTitle(unit),
        question:q.q,
        chosen:chosen ? chosen : "Nie beantwoord nie",
        correct:mathlitCorrectText(q),
        explanation:q.w
      });
    }
  });

  const weak = Object.keys(stats).map(function(k){
    const x = stats[k];
    return {
      unit:x.unit,
      title:mathlitUnitTitle(x.unit),
      wrong:x.wrong,
      total:x.total,
      percent:x.total ? Math.round(((x.total - x.wrong) / x.total) * 100) : 0
    };
  }).filter(function(x){ return x.wrong > 0; }).sort(function(a,b){ return b.wrong - a.wrong; });

  return {wrong:wrong, weak:weak};
}

function mathlitSaveExamHistory(){
  const qs = mathlitExamQuestions();
  const score = mathlitExamScore();
  const pct = qs.length ? Math.round(score / qs.length * 100) : 0;
  const review = mathlitExamReviewData();

  if(!state.mathlitHistory) state.mathlitHistory = [];
  state.mathlitHistory.unshift({
    date:new Date().toLocaleString(),
    score:score,
    total:qs.length,
    percent:pct,
    passed:pct >= 50,
    weak:review.weak.slice(0,5),
    wrongCount:qs.length - score
  });
  state.mathlitHistory = state.mathlitHistory.slice(0,10);

  state.mathlitLastWeak = review.weak;
  state.mathlitLastWrong = review.wrong.slice(0,20);
}

function finishMathlitExam(){
  state.mathlitExamFinished = true;
  if(mathlitExamTimerHandle){
    clearInterval(mathlitExamTimerHandle);
    mathlitExamTimerHandle = null;
  }
  mathlitSaveExamHistory();
  save();
  render();
}

function resetMathlitExam(){
  if(mathlitExamTimerHandle){
    clearInterval(mathlitExamTimerHandle);
    mathlitExamTimerHandle = null;
  }
  state.mathlitExamFinished = false;
  state.mathlitExamAnswers = {};
  state.mathlitExamSet = mathlitShuffle(mathlitQuestions).slice(0, Math.min(15, mathlitQuestions.length));
  state.mathlitExamSecondsLeft = 60 * 60;
  save();
  startMathlitExamTimer();
  render();
}

function mathlitPracticalState(){
  if(!state.mathlitPracticals) state.mathlitPracticals = {};

}

function mathlitCurrentPractical(){
  if(!state.mathlitPracticalId) state.mathlitPracticalId = mathlitPracticalTasks[0].id;
  return mathlitPracticalTasks.find(function(t){ return t.id === state.mathlitPracticalId; }) || mathlitPracticalTasks[0];
}

function mathlitChoosePractical(id){
  state.mathlitPracticalId = id;
  save();
  render();
}

function mathlitPracticalAnswer(taskId, idx){
  const p = mathlitPracticalState();
  if(!p[taskId]) p[taskId] = {answers:{}, marked:false};
  return p[taskId].answers[idx] || "";
}

function mathlitSetPracticalAnswer(taskId, idx, value){
  const p = mathlitPracticalState();
  if(!p[taskId]) p[taskId] = {answers:{}, marked:false};
  p[taskId].answers[idx] = value;
  p[taskId].marked = false;
  save();
}

function mathlitPracticalResult(task){
  const p = mathlitPracticalState();
  const saved = p[task.id] || {answers:{}};
  const joined = task.prompts.map(function(x,i){ return saved.answers[i] || ""; }).join(" ").toLowerCase();
  const wordCount = joined.split(/\s+/).filter(function(x){ return x.trim().length > 0; }).length;
  const keywordHits = task.keywords.filter(function(k){ return joined.indexOf(k.toLowerCase()) >= 0; }).length;

  const checks = [
    {ok: wordCount >= 35, text:"Antwoorde is volledig genoeg"},
    {ok: keywordHits >= 3, text:"Gebruik minstens 3 belangrike vakterme"},
    {ok: task.prompts.every(function(x,i){ return String(saved.answers[i] || "").trim().length >= 15; }), text:"Elke vraag is beantwoord"},
    {ok: joined.indexOf("bereken") >= 0 || joined.indexOf("omdat") >= 0 || joined.indexOf("want") >= 0 || joined.indexOf("verduidelik") >= 0 || joined.indexOf("wys") >= 0, text:"Antwoord wys berekening of verduideliking"}
  ];

  const score = checks.filter(function(c){ return c.ok; }).length;
  return {
    checks:checks,
    score:score,
    total:checks.length,
    percent:Math.round(score / checks.length * 100),
    passed:score >= 3,
    wordCount:wordCount,
    keywordHits:keywordHits
  };
}

function mathlitMarkPractical(){
  const task = mathlitCurrentPractical();
  const p = mathlitPracticalState();
  if(!p[task.id]) p[task.id] = {answers:{}, marked:false};
  p[task.id].marked = true;
  save();
  render();
}

// === TEAE_MATHLIT_WRITTEN_FORMULAS_V1 ===
function mathlitCorrectText(q){
  if(!q) return "";
  if(q.o && typeof q.a === "number") return q.o[q.a] || "";
  return q.answerText || q.correct || "";
}

function mathlitNumberParts(v){
  const s = String(v || "")
    .replace(/,/g,".")
    .replace(/\s+/g," ")
    .replace(/r/ig,"")
    .trim();
  const m = s.match(/-?\d+(\.\d+)?/g);
  return m ? m.map(function(x){ return Number(x); }).filter(function(n){ return !isNaN(n); }) : [];
}

function mathlitWrittenCorrect(q, val){
  const ansText = mathlitCorrectText(q);
  const user = String(val || "").trim();
  if(!user) return false;

  if(typeof teaeWrittenCorrect === "function" && teaeWrittenCorrect(q, user)) return true;

  const ansNums = mathlitNumberParts(ansText);
  const userNums = mathlitNumberParts(user);

  if(ansNums.length && userNums.length){
    for(let i=0;i<ansNums.length;i++){
      for(let j=0;j<userNums.length;j++){
        if(Math.abs(ansNums[i] - userNums[j]) < 0.01) return true;
      }
    }
  }

  const cleanUser = teaeNormAnswer ? teaeNormAnswer(user) : user.toLowerCase();
  const cleanAns = teaeNormAnswer ? teaeNormAnswer(ansText) : ansText.toLowerCase();
  if(cleanUser === cleanAns) return true;
  if(cleanAns && cleanUser.indexOf(cleanAns) >= 0) return true;

  return false;
}

function mathlitFormulaHint(q){
  const m = q.m || "";
  const unit = q.unit || "";
  const text = (q.q || "").toLowerCase();

  if(m === "ml4"){
    if(text.indexOf("persent") >= 0 || text.indexOf("afslag") >= 0 || text.indexOf("verhoog") >= 0){
      return "Persentasie: bedrag × persentasie ÷ 100. Nuwe bedrag = ou bedrag + verhoging of ou bedrag - afslag.";
    }
    if(text.indexOf("tarief") >= 0 || text.indexOf("per") >= 0 || text.indexOf("eenheid") >= 0 || text.indexOf("kwh") >= 0 || text.indexOf("kl") >= 0){
      return "Tarief: totale koste = vaste fooi + (aantal eenhede × prys per eenheid).";
    }
    return "Finansies: lees die bedrae, kies die regte bewerking, en wys jou totaal met Rand.";
  }

  if(m === "ml5"){
    if(text.indexOf("area") >= 0) return "Area van reghoek = lengte × breedte.";
    if(text.indexOf("omtrek") >= 0) return "Omtrek van reghoek = 2 × (lengte + breedte).";
    if(text.indexOf("km") >= 0 || text.indexOf("meter") >= 0 || text.indexOf("cm") >= 0 || text.indexOf("mm") >= 0){
      return "Lengte: 1 km = 1000 m, 1 m = 100 cm, 1 cm = 10 mm.";
    }
    if(text.indexOf("kg") >= 0 || text.indexOf("gram") >= 0 || text.indexOf(" g") >= 0){
      return "Massa: 1 kg = 1000 g. Om kg na g te gaan, maal met 1000.";
    }
    if(text.indexOf("l") >= 0 || text.indexOf("ml") >= 0 || text.indexOf("liter") >= 0){
      return "Volume: 1 L = 1000 ml. Om L na ml te gaan, maal met 1000.";
    }
    if(text.indexOf("temperatuur") >= 0 || text.indexOf("verskil") >= 0 || text.indexOf("gedaal") >= 0 || text.indexOf("gestyg") >= 0){
      return "Temperatuurverskil: groter temperatuur - kleiner temperatuur.";
    }
    return "Meting: skakel eers eenhede reg om, dan bereken.";
  }

  if(m === "ml6"){
    if(text.indexOf("skaal") >= 0 || text.indexOf("plan") >= 0 || text.indexOf("kaart") >= 0 || text.indexOf("werklik") >= 0){
      return "Skaal: werklike afstand = kaartafstand × skaal. Maak seker die eenhede is reg.";
    }
    if(text.indexOf("rigting") >= 0 || text.indexOf("noord") >= 0 || text.indexOf("oos") >= 0 || text.indexOf("wes") >= 0 || text.indexOf("suid") >= 0){
      return "Rigtings: Noord is bo, Suid is onder, Oos is regs, Wes is links.";
    }
    return "Kaarte en planne: gebruik titel, legende, rooster, rigting en skaal.";
  }

  if(m === "ml7"){
    return "Waarskynlikheid: P(gebeurtenis) = gunstige uitkomste ÷ totale uitkomste.";
  }

  return "Lees die vraag stadig, skryf die formule neer, vervang die getalle en bereken.";
}

const TEAE_DAILY_QUESTION_LIMIT = 15;

function teaeSessionKey(subject, moduleId){
  const d = new Date();
  const day = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  return subject + "::" + (moduleId || "all") + "::" + day;
}

function teaePickSessionQuestions(subject, moduleId, questions){
  if(!state.teaeDailySessions) state.teaeDailySessions = {};
  const key = teaeSessionKey(subject, moduleId);
  const total = questions.length;

  if(!state.teaeDailySessions[key] || state.teaeDailySessions[key].total !== total){
    let indexes = [];
    for(let i=0;i<total;i++) indexes.push(i);

    for(let i=indexes.length-1;i>0;i--){
      const j = Math.floor(Math.random() * (i + 1));
      const t = indexes[i];
      indexes[i] = indexes[j];
      indexes[j] = t;
    }

    state.teaeDailySessions[key] = {
      total: total,
      indexes: indexes.slice(0, Math.min(TEAE_DAILY_QUESTION_LIMIT, total))
    };
    save();
  }

  return state.teaeDailySessions[key].indexes.map(function(idx){ return questions[idx]; }).filter(Boolean);
}

function teaeNewQuestionSession(subject, moduleId){
  if(!state.teaeDailySessions) state.teaeDailySessions = {};
  delete state.teaeDailySessions[teaeSessionKey(subject, moduleId)];
  save();
  render();
}

<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  const subject = (params.get("subject") || "").toLowerCase();

  if(!subject) return;

  const subjectMap = {
    k53: ["k53", "learner", "licence", "license"],
    cat: ["cat", "rtt", "computer", "computers"],
    landbou: ["landbou", "landbou wetenskappe", "agri", "agriculture"],
    mathlit: ["mathlit", "wiskundige geletterdheid", "wiskunde geletterdheid"]
  };

  const titleMap = {
    k53: "K53",
    cat: "RTT / CAT",
    landbou: "Landbou",
    mathlit: "MathLit"
  };

  const wanted = subjectMap[subject] || [subject];
  const pretty = titleMap[subject] || subject.toUpperCase();

  function norm(x){
    return String(x || "").toLowerCase().replace(/\s+/g," ").trim();
  }

  function makeBar(){
    if(document.getElementById("teaeSubjectRouterBar")) return;

    const bar = document.createElement("div");
    bar.id = "teaeSubjectRouterBar";
    bar.innerHTML = `
      <b>Enrico - ${pretty}</b>
      <span>Hierdie blad is direk oopgemaak vir ${pretty}.</span>
      <a href="index.html">Terug hoofkieslys</a>
    `;

    document.body.insertBefore(bar, document.body.firstChild);
    bar.style.display = "flex";
  }

  function scoreElement(el){
    const t = norm(el.innerText || el.textContent || "");
    if(!t) return 0;

    let score = 0;
    wanted.forEach(w => {
      if(t.includes(norm(w))) score += 10;
    });

    if(t.includes("open")) score += 5;
    if(t.includes("exam")) score += 5;
    if(t.includes("start")) score += 5;
    if(t.includes("begin")) score += 5;

    return score;
  }

  function findBestClickable(){
    const clickables = Array.from(document.querySelectorAll("button,a,[onclick],.card,.subject-card"));
    let best = null;
    let bestScore = 0;

    clickables.forEach(el => {
      const s = scoreElement(el);
      if(s > bestScore){
        best = el;
        bestScore = s;
      }
    });

    return bestScore >= 10 ? best : null;
  }

  function tryOpenSubject(){
    makeBar();

    const best = findBestClickable();

    if(best){
      best.scrollIntoView({behavior:"smooth", block:"center"});
      setTimeout(() => {
        try { best.click(); } catch(e) {}
      }, 350);
      return true;
    }

    return false;
  }

  function reduceWholeAppLook(){
    // Maak net visueel minder deurmekaar as hy nog op die hoof legacy blad is.
    const headings = Array.from(document.querySelectorAll("h1,h2,h3"));
    headings.forEach(h => {
      const t = norm(h.innerText);
      if(t.includes("all subjects progress") || t.includes("choose a subject")){
        const box = h.closest("section,div,main") || h;
        box.style.border = "3px solid #2563eb";
        box.style.borderRadius = "18px";
      }
    });
  }

  document.addEventListener("DOMContentLoaded", function(){
    makeBar();

    let tries = 0;
    const timer = setInterval(function(){
      tries++;
      const ok = tryOpenSubject();
      reduceWholeAppLook();

      if(ok || tries > 10){
        clearInterval(timer);
      }
    }, 600);
  });
})();
</script>

  padding:18px 22px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  font-family:Arial,sans-serif;
  position:sticky;
  top:0;
  z-index:999999;
}
#teaeSingleSubjectTop b{
  font-size:22px;
}
#teaeSingleSubjectTop a{
  background:#dc2626;
  color:white;
  text-decoration:none;
  padding:11px 16px;
  border-radius:12px;
  font-weight:900;
}
.teae-hidden-subject{
  display:none !important;
}
.teae-target-subject{
  border:3px solid #2563eb !important;
  box-shadow:0 0 0 4px #dbeafe !important;
}
</style>

<script>
(function(){
  const SUBJECT_KEY = "cat";
  const SUBJECT_TITLE = "RTT / CAT";
  const MATCH_WORDS = ["rtt","cat","computer","computers"];

  function norm(x){
    return String(x || "").toLowerCase().replace(/\\s+/g," ").trim();
  }

  function hasSubjectText(el){
    const t = norm(el.innerText || el.textContent || "");
    return MATCH_WORDS.some(w => t.includes(norm(w)));
  }

  function makeTop(){
    if(document.getElementById("teaeSingleSubjectTop")) return;

    const bar = document.createElement("div");
    bar.id = "teaeSingleSubjectTop";
    bar.innerHTML = 
      <b>Enrico - \</b>
      <span>Hierdie blad wys net \.</span>
      <a href="index.html">Terug hoofkieslys</a>
    ;

    document.body.insertBefore(bar, document.body.firstChild);
  }

  function hideOtherSubjectCards(){
    const candidates = Array.from(document.querySelectorAll("section, article, .card, div, a, button"))
      .filter(el => {
        const t = norm(el.innerText || el.textContent || "");
        if(!t) return false;

        const looksLikeSubject =
          t.includes("k53") ||
          t.includes("rtt") ||
          t.includes("cat") ||
          t.includes("landbou") ||
          t.includes("mathlit") ||
          t.includes("wiskundige geletterdheid") ||
          t.includes("learner") ||
          t.includes("computers");

        return looksLikeSubject && el.offsetParent !== null;
      });

    candidates.forEach(el => {
      const t = norm(el.innerText || el.textContent || "");

      const isOther =
        (
          t.includes("k53") ||
          t.includes("rtt") ||
          t.includes("cat") ||
          t.includes("landbou") ||
          t.includes("mathlit") ||
          t.includes("wiskundige geletterdheid") ||
          t.includes("learner") ||
          t.includes("computers")
        ) && !hasSubjectText(el);

      if(isOther){
        const card = el.closest(".card, section, article") || el;
        card.classList.add("teae-hidden-subject");
      }

      if(hasSubjectText(el)){
        const card = el.closest(".card, section, article") || el;
        card.classList.add("teae-target-subject");
      }
    });
  }

  function clickTargetOpen(){
    const buttons = Array.from(document.querySelectorAll("button,a"));
    let best = null;

    for(const b of buttons){
      const t = norm(b.innerText || b.textContent || "");
      const parentText = norm((b.closest(".card, section, article, div") || b).innerText || "");

      const isOpen = t.includes("open") || t.includes("start") || t.includes("exam") || t.includes("begin");
      const isTarget = MATCH_WORDS.some(w => parentText.includes(norm(w)));

      if(isOpen && isTarget){
        best = b;
        break;
      }
    }

    if(best && !window.__teaeClickedSubject){
      window.__teaeClickedSubject = true;
      setTimeout(() => {
        try { best.click(); } catch(e) {}
      }, 600);
    }
  }

  function run(){
    makeTop();
    hideOtherSubjectCards();

    // Moenie te aggressief click as hy reeds in 'n toets is nie.
    const bodyText = norm(document.body.innerText || "");
    const inTest = bodyText.includes("question") || bodyText.includes("vraag") || bodyText.includes("antwoord");
    if(!inTest) clickTargetOpen();
  }

  document.addEventListener("DOMContentLoaded", function(){
    run();
    let count = 0;
    const timer = setInterval(function(){
      count++;
      run();
      if(count > 8) clearInterval(timer);
    }, 700);
  });
})();
</script>

  border-radius:12px;
  padding:10px 14px;
  font-weight:900;
}
</style>

<script>
(function(){
  const TITLE = "RTT / CAT";
  const KEYWORDS = ["cat","rtt","computer","computers"];

  function norm(x){
    return String(x || "").toLowerCase().replace(/\\s+/g," ").trim();
  }

  function addBar(){
    if(document.getElementById("teaeDirectSubjectBar")) return;
    const bar = document.createElement("div");
    bar.id = "teaeDirectSubjectBar";
    bar.innerHTML = '<b>Enrico - ' + TITLE + '</b><span>Besig om direk die regte vak oop te maak...</span><a href="index.html">Terug hoofkieslys</a>';
    document.body.insertBefore(bar, document.body.firstChild);
  }

  function isTargetText(txt){
    txt = norm(txt);
    return KEYWORDS.some(k => txt.includes(norm(k)));
  }

  function clickBestTarget(){
    const all = Array.from(document.querySelectorAll("button,a,div"));
    let best = null;
    let score = 0;

    for(const el of all){
      const txt = norm(el.innerText || el.textContent || "");
      const parent = norm((el.closest(".card, section, article, div") || el).innerText || "");
      let s = 0;

      if(isTargetText(txt)) s += 20;
      if(isTargetText(parent)) s += 20;

      if(txt.includes("exam")) s += 15;
      if(txt.includes("open")) s += 12;
      if(txt.includes("start")) s += 12;
      if(txt.includes("begin")) s += 12;

      if(s > score){
        score = s;
        best = el;
      }
    }

    if(best && score >= 25){
      best.scrollIntoView({behavior:"smooth", block:"center"});
      setTimeout(() => {
        try { best.click(); } catch(e){}
      }, 300);
      return true;
    }

    return false;
  }

  function hideWrongCards(){
    const cards = Array.from(document.querySelectorAll(".card, section, article"));
    cards.forEach(card => {
      const t = norm(card.innerText || card.textContent || "");
      const hasSubjects = t.includes("k53") || t.includes("cat") || t.includes("rtt") || t.includes("landbou") || t.includes("mathlit") || t.includes("wiskundige");
      if(hasSubjects && !isTargetText(t)){
        card.style.display = "none";
      }
    });
  }

  document.addEventListener("DOMContentLoaded", function(){
    addBar();

    let tries = 0;
    const timer = setInterval(function(){
      tries++;
      hideWrongCards();

      const body = norm(document.body.innerText || "");
      const alreadyInExam = body.includes("question") || body.includes("vraag") || body.includes("antwoord") || body.includes("submit");

      if(!alreadyInExam){
        clickBestTarget();
      } else {
        const bar = document.getElementById("teaeDirectSubjectBar");
        if(bar) bar.querySelector("span").innerText = "Regte vak is oop.";
        clearInterval(timer);
      }

      if(tries > 12){
        clearInterval(timer);
      }
    }, 500);
  });
})();
</script>
