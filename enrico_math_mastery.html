<style>
*{box-sizing:border-box}

.box{background:#f8fbff;border:1px solid #d9e2ec;border-radius:12px;padding:12px}
table{width:100%;border-collapse:collapse;font-size:15px}
th,td{border:1px solid #b9c7d4;padding:8px;text-align:left}

.note{background:#fff7d6;border:1px solid #f1d08b;border-radius:12px;padding:10px;margin-top:12px;font-weight:800}

.bar{height:100%;background:#0b78bd;width:0%}

svg{max-width:100%;height:auto}
.hidden{display:none}
@media(max-width:800px){
  .wrap{padding:10px}

<script>
(function(){
  function parseProgress(){
    var text = document.body.innerText || "";
    var m = text.match(/(\d+)\s*\/\s*(\d+)/);
    var done = 0, total = 547;

    if(m){
      done = parseInt(m[1],10) || 0;
      total = parseInt(m[2],10) || 547;
    }

    return {
      done: done,
      total: total,
      remaining: Math.max(0,total-done)
    };
  }

  function findButtonByText(words){
    var buttons = Array.from(document.querySelectorAll("button,a"));
    return buttons.find(function(b){
      var t = (b.innerText || b.textContent || "").toLowerCase();
      return words.every(function(w){ return t.includes(w); });
    });
  }

  window.enricoStartNew = function(){
    if(typeof teaeStartMathSession === "function"){
      teaeStartMathSession();
    } else if(typeof startFreshTest === "function"){
      startFreshTest();
    }
  };

  window.enricoWrongOnly = function(){
    var b = findButtonByText(["verkeerde"]) || findButtonByText(["volgende"]);
    if(b) b.click();
  };

  window.enricoRandom = function(){
    var b = findButtonByText(["random"]);
    if(b) b.click();
  };

  function buildDashboard(){
    if(document.getElementById("enricoEdrickDash")) return;

    var p = parseProgress();

    var top = document.createElement("div");
    top.className = "enrico-edrick-top";
    top.innerHTML = `
      <h1>Enrico - Finale Oefen Toetse</h1>
      <p>Wiskunde | Groot vraebank | Adaptiewe leer | Outomaties gemerk</p>
    `;

    var wrap = document.createElement("div");
    wrap.className = "enrico-edrick-wrap";
    wrap.id = "enricoEdrickDash";
    wrap.innerHTML = `
      <section class="enrico-edrick-card">
        <h2>Wiskunde</h2>
        <p>Hier is nie vaste vraestelnommers nie. Enrico werk deur die groot vraebank totdat alles reg is.</p>

        <div class="enrico-edrick-grid">
          <div class="enrico-edrick-stats">
            <h3>Wiskunde Adaptiewe Leerbank</h3>

            <div class="enrico-edrick-row">
              <b>Vrae in groot bank</b>
              <span id="enricoBankTotal">${p.total}</span>
            </div>

            <div class="enrico-edrick-row">
              <b>Reeds reg</b>
              <span id="enricoBankDone">${p.done}</span>
            </div>

            <div class="enrico-edrick-row">
              <b>Vrae nog oor</b>
              <span class="enrico-big" id="enricoBankRemaining">${p.remaining}</span>
            </div>

            <p style="color:#64748b">
              Hierdie dashboard wys Enrico se bestaande Wiskunde progress. Geen vrae is weggevat of gereset nie.
            </p>
          </div>

          <div>
            <div class="enrico-edrick-actions">
              <button class="enrico-green" onclick="enricoStartNew()">Begin volgende oefensessie</button>
              <button class="enrico-blue" onclick="enricoWrongOnly()">Net verkeerde vrae</button>
              <button class="enrico-dark" onclick="enricoRandom()">Random</button>
              <a class="enrico-red" href="index.html">Terug hoofkieslys</a>
            </div>

            <div class="enrico-help">
              <b>Hoe dit werk:</b><br>
              Enrico se bestaande Wiskunde app hou sy eie progress. Hierdie skerm wys dit nou soos Edrick se layout.
              Vrae en bestaande werk word nie uitgevee nie.
            </div>
          </div>
        </div>
      </section>
    `;

    document.body.insertBefore(wrap, document.body.firstChild);
    document.body.insertBefore(top, wrap);
  }

  function updateDashboard(){
    var p = parseProgress();
    var total = document.getElementById("enricoBankTotal");
    var done = document.getElementById("enricoBankDone");
    var remaining = document.getElementById("enricoBankRemaining");

    if(total) total.textContent = p.total;
    if(done) done.textContent = p.done;
    if(remaining) remaining.textContent = p.remaining;
  }

  document.addEventListener("DOMContentLoaded", function(){
    buildDashboard();
    updateDashboard();
    setInterval(updateDashboard, 1000);
  });
})();
</script>

const topics = [
  "Alles",
  "Finansiële dokumente",
  "Fakture en VAT",
  "Krediet en paaiemente",
  "Tariefstelsels",
  "Wins, verlies en persentasies",
  "Payslips",
  "Meting: lengte",
  "Meting: massa",
  "Meting: volume en kapasiteit",
  "Meting: temperatuur",
  "Kaarte en skaal",
  "Planne en vloerplanne",
  "Relatiewe posisie",
  "ChatGPT Prente & Vrae",
  "Waarskynlikheid"
];

let allQuestions = [];
let questions = [];
let current = 0;
let selectedTopic = "Alles";
let answers = {};
let wrongQuestions = [];
let masteredKeys = [];
try { masteredKeys = JSON.parse(localStorage.getItem("enricoMathMasteredKeys") || "[]"); } catch(e) { masteredKeys = []; }
let stars = masteredKeys.length;

function money(n){return "R" + Number(n).toFixed(2).replace(".", ",").replace(/\B(?=(\d{3})+(?!\d))/g," ")}
function round2(n){return Math.round(Number(n)*100)/100}
function norm(v){return String(v || "").trim().replace(",", ".").replace(/\s/g,"")}
function isCorrect(v,a){
  const raw = String(v || "").trim().toLowerCase();
  const ansRaw = String(a || "").trim().toLowerCase();
  const n = Number(norm(v));
  const an = Number(norm(a));
  if(!Number.isNaN(n) && !Number.isNaN(an)) return Math.abs(n-an)<0.01;
  const clean = s => String(s||"").toLowerCase().trim()
    .replace(/\s+/g," ")
    .replace(/-/g," ")
    .replace(/_/g," ");
  const user = clean(raw);
  const ans = clean(ansRaw);
  if(user === ans) return true;
  const trueWords = ["true","waar","yes","ja"];
  const falseWords = ["false","vals","no","nee"];
  if(trueWords.includes(user) && trueWords.includes(ans)) return true;
  if(falseWords.includes(user) && falseWords.includes(ans)) return true;
  return false;
}
function qKey(q){return q.id}
function save(){
  stars = masteredKeys.length;
  localStorage.setItem("enricoMathStars", String(stars));
  localStorage.setItem("enricoMathMasteredKeys", JSON.stringify(masteredKeys));
  localStorage.setItem("enricoMathWrongKeys", JSON.stringify(wrongQuestions.map(qKey)));
}
function getSavedWrong(){let keys=[];try{keys=JSON.parse(localStorage.getItem("enricoMathWrongKeys")||"[]")}catch(e){};return allQuestions.filter(q=>keys.includes(qKey(q)))}

function add(q){allQuestions.push(q)}

function buildBank(i){
  const opening = 1200 + i*85;
  const deposit = 500 + i*50;
  const atm = 100 + i*20;
  const charge = 12 + i*3;
  const debitPurchase = 90 + i*15;
  const A = opening + deposit;
  const B = A - atm;
  const C = B - charge;
  const D = C - debitPurchase;
  const data = {opening,deposit,atm,charge,debitPurchase,A,B,C,D};
  const topic = "Finansiële dokumente";

  add({id:`bank-${i}-A`,topic,level:"Maklik",unit:"R",answer:A,visual:{type:"bank",data},formula:"A = opening balance + deposit",q:"Gebruik die bankstaat. Bereken die waarde van A in die Balance-kolom.",steps:[`${money(opening)} + ${money(deposit)} = ${money(A)}`]});
  add({id:`bank-${i}-B`,topic,level:"Maklik",unit:"R",answer:B,visual:{type:"bank",data},formula:"B = A - ATM cash",q:"Gebruik die bankstaat. Bereken die waarde van B nadat ATM cash afgetrek is.",steps:[`${money(A)} - ${money(atm)} = ${money(B)}`]});
  add({id:`bank-${i}-C`,topic,level:"Medium",unit:"R",answer:C,visual:{type:"bank",data},formula:"C = B - bank charges",q:"Gebruik die bankstaat. Bereken die waarde van C nadat bank charges afgetrek is.",steps:[`${money(B)} - ${money(charge)} = ${money(C)}`]});
  add({id:`bank-${i}-D`,topic,level:"Medium",unit:"R",answer:D,visual:{type:"bank",data},formula:"Closing balance = C - debit card purchase",q:"Gebruik die bankstaat. Bereken die closing balance nadat die debit card purchase afgetrek is.",steps:[`${money(C)} - ${money(debitPurchase)} = ${money(D)}`]});
  add({id:`bank-${i}-payments`,topic,level:"Medium",unit:"R",answer:atm+charge+debitPurchase,visual:{type:"bank",data},formula:"Total payments = ATM cash + bank charges + card purchase",q:"Gebruik die bankstaat. Bereken die totale betalings/payments op die staat.",steps:[`${money(atm)} + ${money(charge)} + ${money(debitPurchase)} = ${money(atm+charge+debitPurchase)}`]});
}

function buildInvoice(i){
  const prices = [159+i*7, 84+i*5, 217+i*9];
  const qty = [1+(i%3), 2+(i%2), 1+((i+1)%3)];
  const subtotal = prices.reduce((s,p,idx)=>s+p*qty[idx],0);
  const vat = round2(subtotal*0.15);
  const total = round2(subtotal+vat);
  const deposit = 100 + i*25;
  const balance = round2(total-deposit);
  const data = {prices,qty,subtotal,vat,total,deposit,balance};
  const topic = "Fakture en VAT";

  add({id:`inv-${i}-line1`,topic,level:"Maklik",unit:"R",answer:prices[0]*qty[0],visual:{type:"invoice",data},formula:"Line amount = quantity × unit price",q:"Gebruik die faktuur. Bereken die bedrag vir Item A.",steps:[`${qty[0]} × ${money(prices[0])} = ${money(prices[0]*qty[0])}`]});
  add({id:`inv-${i}-subtotal`,topic,level:"Medium",unit:"R",answer:subtotal,visual:{type:"invoice",data},formula:"Subtotal = total of all line amounts",q:"Gebruik die faktuur. Bereken die subtotal voor VAT.",steps:[`Tel al die item-bedrae bymekaar = ${money(subtotal)}`]});
  add({id:`inv-${i}-vat`,topic,level:"Medium",unit:"R",answer:vat,visual:{type:"invoice",data},formula:"VAT = subtotal × 15%",q:"Gebruik die faktuur. Bereken die VAT-bedrag teen 15%.",steps:[`${money(subtotal)} × 15% = ${money(vat)}`]});
  add({id:`inv-${i}-total`,topic,level:"Medium",unit:"R",answer:total,visual:{type:"invoice",data},formula:"Total = subtotal + VAT",q:"Gebruik die faktuur. Bereken die totaal including VAT.",steps:[`${money(subtotal)} + ${money(vat)} = ${money(total)}`]});
  add({id:`inv-${i}-balance`,topic,level:"Moeilik",unit:"R",answer:balance,visual:{type:"invoice",data},formula:"Balance due = total - deposit",q:"Gebruik die faktuur. Die klant betaal die deposit. Bereken die balance due.",steps:[`${money(total)} - ${money(deposit)} = ${money(balance)}`]});
}

function buildPayslip(i){
  const basic = 12000 + i*450;
  const hours = 8 + i*3;
  const rate = 75 + i*5;
  const overtime = hours*rate;
  const uif = round2(basic*0.01);
  const paye = 1300 + i*85;
  const medical = 900 + i*40;
  const totalIncome = basic + overtime;
  const deductions = round2(uif+paye+medical);
  const net = round2(totalIncome-deductions);
  const data = {basic,hours,rate,overtime,uif,paye,medical,totalIncome,deductions,net};
  const topic = "Payslips";

  add({id:`pay-${i}-ot`,topic,level:"Maklik",unit:"R",answer:overtime,visual:{type:"payslip",data},formula:"Overtime = hours × rate",q:"Gebruik die payslip. Bereken die overtime bedrag.",steps:[`${hours} × ${money(rate)} = ${money(overtime)}`]});
  add({id:`pay-${i}-uif`,topic,level:"Maklik",unit:"R",answer:uif,visual:{type:"payslip",data},formula:"UIF = 1% of basic salary",q:"Gebruik die payslip. Bereken die UIF-bedrag.",steps:[`${money(basic)} × 1% = ${money(uif)}`]});
  add({id:`pay-${i}-income`,topic,level:"Medium",unit:"R",answer:totalIncome,visual:{type:"payslip",data},formula:"Total income = basic salary + overtime",q:"Gebruik die payslip. Bereken total income.",steps:[`${money(basic)} + ${money(overtime)} = ${money(totalIncome)}`]});
  add({id:`pay-${i}-ded`,topic,level:"Medium",unit:"R",answer:deductions,visual:{type:"payslip",data},formula:"Total deductions = PAYE + medical aid + UIF",q:"Gebruik die payslip. Bereken total deductions.",steps:[`${money(paye)} + ${money(medical)} + ${money(uif)} = ${money(deductions)}`]});
  add({id:`pay-${i}-net`,topic,level:"Moeilik",unit:"R",answer:net,visual:{type:"payslip",data},formula:"Net pay = total income - deductions",q:"Gebruik die payslip. Bereken die net pay.",steps:[`${money(totalIncome)} - ${money(deductions)} = ${money(net)}`]});
}

function buildTariff(i){
  const units = 72 + i*8;
  const service = 65;
  const b1 = Math.min(units,50);
  const b2 = Math.min(Math.max(units-50,0),50);
  const b3 = Math.max(units-100,0);
  const total = round2(service + b1*1.85 + b2*2.25 + b3*2.9);
  const data = {units,service,b1,b2,b3,total};
  const topic = "Tariefstelsels";

function buildProbabilityQ2(){
  const sets = [
    {name:"sak lekkers", red:3, blue:5, green:2, yellow:4},
    {name:"spinner", red:4, blue:4, green:1, yellow:3},
    {name:"knikker-sak", red:6, blue:2, green:5, yellow:7},
    {name:"kaart-pak", red:8, blue:6, green:3, yellow:3},
    {name:"teller-boks", red:2, blue:7, green:4, yellow:5},
    {name:"speelgoed-boks", red:5, blue:5, green:5, yellow:5},
    {name:"raffle-boks", red:9, blue:3, green:6, yellow:2},
    {name:"kleurwiel", red:1, blue:4, green:7, yellow:8},
    {name:"bal-sak", red:10, blue:5, green:5, yellow:10},
    {name:"vorm-boks", red:6, blue:9, green:3, yellow:6}
  ];

  sets.forEach((s, i)=>{
    const total = s.red + s.blue + s.green + s.yellow;
    const redProb = round2(s.red / total);
    const blueProb = round2(s.blue / total);
    const notGreen = round2((total - s.green) / total);
    const yellowPct = round2((s.yellow / total) * 100);

    add({
      id:`prob-${i}-red-decimal`,
      topic:"Waarskynlikheid",
      level:"Maklik",
      unit:"",
      answer:redProb,
      visual:{type:"probability",data:s},
      formula:"Probability = favourable outcomes ÷ total outcomes",
      q:`Gebruik die tabel. Wat is die waarskynlikheid om rooi te kies? Gee die antwoord as 'n desimale getal.`,
      steps:[`Rooi = ${s.red}`,`Totaal = ${total}`,`${s.red} ÷ ${total} = ${redProb}`]
    });

    add({
      id:`prob-${i}-blue-decimal`,
      topic:"Waarskynlikheid",
      level:"Maklik",
      unit:"",
      answer:blueProb,
      visual:{type:"probability",data:s},
      formula:"Probability = favourable outcomes ÷ total outcomes",
      q:`Gebruik die tabel. Wat is die waarskynlikheid om blou te kies? Gee die antwoord as 'n desimale getal.`,
      steps:[`Blou = ${s.blue}`,`Totaal = ${total}`,`${s.blue} ÷ ${total} = ${blueProb}`]
    });

    add({
      id:`prob-${i}-not-green`,
      topic:"Waarskynlikheid",
      level:"Medium",
      unit:"",
      answer:notGreen,
      visual:{type:"probability",data:s},
      formula:"P(not green) = outcomes that are not green ÷ total outcomes",
      q:`Gebruik die tabel. Wat is die waarskynlikheid om NIE groen te kies nie? Gee die antwoord as 'n desimale getal.`,
      steps:[`Nie groen = ${total} - ${s.green} = ${total - s.green}`,`Totaal = ${total}`,`${total - s.green} ÷ ${total} = ${notGreen}`]
    });

    add({
      id:`prob-${i}-yellow-percent`,
      topic:"Waarskynlikheid",
      level:"Medium",
      unit:"%",
      answer:yellowPct,
      visual:{type:"probability",data:s},
      formula:"Percentage probability = favourable outcomes ÷ total outcomes × 100",
      q:`Gebruik die tabel. Wat is die waarskynlikheid om geel te kies? Gee die antwoord as 'n persentasie.`,
      steps:[`Geel = ${s.yellow}`,`Totaal = ${total}`,`${s.yellow} ÷ ${total} × 100 = ${yellowPct}%`]
    });
  });
}

  return selectedTopic==="Alles" ? [...allQuestions] : allQuestions.filter(q=>q.topic===selectedTopic);

function shuffle(arr){return arr.sort(()=>Math.random()-0.5)}

function teaeMathSessionPool(){
  let base = pool();

  try {
    const mastered = Array.from(new Set(masteredKeys || []));
    const notMastered = base.filter(q => !mastered.includes(qKey(q)));
    if(notMastered.length > 0) base = notMastered;
  } catch(e) {}

  base = shuffle([...base]);

  const size = base.length <= 50 ? base.length : 30 + Math.floor(Math.random() * 21);
  return base.slice(0, size);
}

function teaeStartMathSession(){
  questions = teaeMathSessionPool();
  current = 0;
  answers = {};
  wrongQuestions = [];

  const review = document.getElementById("review");
  if(review) review.innerHTML = "";

  render();
}

  if(!wrong.length){
    document.getElementById("review").innerHTML = `<div class="feedback good">✅ Geen verkeerde vrae gestoor nie. Begin eers ’n nuwe toets.</div>`;
    return;
  }
  questions = shuffle(selectedTopic==="Alles" ? wrong : wrong.filter(q=>q.topic===selectedTopic));
  if(!questions.length) questions = wrong;
  current = 0;
  answers = {};
  wrongQuestions = [];
  document.getElementById("review").innerHTML = "";
  render();
}

function shuffleCurrent(){
  teaeStartMathSession();
}

function render(){
  if(!questions.length) questions = shuffle(pool());
  const q = questions[current];
  document.getElementById("meta").innerHTML = `<b>Vraag ${current+1} van ${questions.length}</b> — ${q.topic} • ${q.level}`;
  document.getElementById("visual").innerHTML = renderVisual(q);
  document.getElementById("question").textContent = q.q;
  document.getElementById("unit").textContent = q.unit || "";
  document.getElementById("answer").value = answers[qKey(q)] || "";
  let wrongCountNow = 0;
try {
  wrongCountNow = questions.filter(q => {
    const k = qKey(q);
    return Object.prototype.hasOwnProperty.call(answers, k) &&
      String(answers[k] ?? "").trim() !== "" &&
      !isCorrect(answers[k], q.answer);
  }).length;
} catch(e) { wrongCountNow = 0; }

const outstandingNow = Math.max(0, allQuestions.length - Array.from(new Set(masteredKeys)).length);
document.getElementById("status").textContent = `Bemeester: ${Array.from(new Set(masteredKeys)).length}/${allQuestions.length} | Uitstaande: ${outstandingNow} | Verkeerd hierdie toets: ${wrongCountNow} | Hierdie toets: ${questions.length} vrae`;
  document.getElementById("stars").textContent = "⭐ " + masteredKeys.length + "/" + allQuestions.length;
  document.getElementById("bar").style.width = ((current)/questions.length*100) + "%";
  setTimeout(()=>document.getElementById("answer").focus(),50);
}

function markCurrentQuestionQuietly(){
  const q = questions[current];
  if(!q) return;

  const key = qKey(q);
  const val = document.getElementById("answer").value;

  answers[key] = val;

  if(isCorrect(val, q.answer)){
    if(!masteredKeys.includes(key)){
      masteredKeys.push(key);
      save();
    }
  }

  document.getElementById("stars").textContent = "⭐ " + masteredKeys.length + "/" + allQuestions.length;
}

function submitAnswer(){
  if(window.__teaeMarkBusy) return;
  window.__teaeMarkBusy = true;

  const q = questions[current];
  if(!q){
    window.__teaeMarkBusy = false;
    return;
  }

  const val = document.getElementById("answer").value;
  const ok = isCorrect(val, q.answer);

  markCurrentQuestionQuietly();

  const status = document.getElementById("status");
  status.innerHTML = ok
    ? `<span style="display:inline-block;background:#dcfce7;color:#14532d;border:2px solid #22c55e;border-radius:999px;padding:10px 16px;font-weight:1000;font-size:20px">✅ Correct</span>`
    : `<span style="display:inline-block;background:#fee2e2;color:#7f1d1d;border:2px solid #ef4444;border-radius:999px;padding:10px 16px;font-weight:1000;font-size:20px">❌ Incorrect</span>`;

  setTimeout(()=>{
    window.__teaeMarkBusy = false;

    const teaeDoneNow = teaeAnsweredInThisTest();
    if(teaeNeedWhatsappAfterDone(teaeDoneNow)){
      teaeShowWhatsappGate();
      return;
    }

    if(current < questions.length-1){
      current++;
      render();
    } else {
      finishTest();
    }
  }, 750);
}

function skipQuestion(){
  if(window.__teaeMarkBusy) return;
  window.__teaeMarkBusy = true;

  const q = questions[current];
  if(q) answers[qKey(q)] = "";

  const status = document.getElementById("status");
  status.innerHTML = `<span style="display:inline-block;background:#fef3c7;color:#92400e;border:2px solid #f59e0b;border-radius:999px;padding:10px 16px;font-weight:1000;font-size:20px">⏭ Oop gelos</span>`;

  setTimeout(()=>{
    window.__teaeMarkBusy = false;

    const teaeDoneNow = teaeAnsweredInThisTest();
    if(teaeNeedWhatsappAfterDone(teaeDoneNow)){
      teaeShowWhatsappGate();
      return;
    }

    if(current < questions.length-1){
      current++;
      render();
    } else {
      finishTest();
    }
  }, 500);
}

function finishTest(){
  try {
    const left = teaeUnansweredCount();
    if(left > 0){
      teaeShowNoCheatMessage();
      return;
    }
  } catch(e) {}
  if(!questions.length)return;
  const q = questions[current];
  if(q) answers[qKey(q)] = document.getElementById("answer").value;

  wrongQuestions=[];
  let correct=0;
  questions.forEach(item=>{
    const key = qKey(item);
    if(isCorrect(answers[key], item.answer)) {
      correct++;
      if(!masteredKeys.includes(key)) masteredKeys.push(key);
    } else {
      wrongQuestions.push(item);
    }
  });

  stars = masteredKeys.length;
  save();

  document.getElementById("bar").style.width = "100%";
  document.getElementById("meta").innerHTML = "<b>Toets klaar</b>";
  document.getElementById("visual").innerHTML = "";
  document.getElementById("question").textContent = `Jy het ${correct} uit ${questions.length} reg.`;
  document.getElementById("answer").value = "";
  document.getElementById("unit").textContent = "";
  document.getElementById("stars").textContent = "⭐ " + masteredKeys.length + "/" + allQuestions.length;
  document.getElementById("status").textContent = wrongQuestions.length ? "Volgende toets vra net die vrae wat verkeerd was." : "Mooi! Alles in hierdie toets is reg. As alles bemeester is, kan jy 'n vars ronde begin.";

  let html = wrongQuestions.length
    ? `<div class="feedback bad">❌ Leer hierdie verkeerde vrae. Klik daarna “Volgende toets: net verkeerdes”.</div>`
    : `<div class="feedback good">✅ Perfek! Alles reg.</div>`;

  html += `<div class="review"><h2>Verkeerde vrae met verduideliking</h2>`;
  wrongQuestions.forEach((item,idx)=>{
    const userAns = answers[qKey(item)] || "(oop gelos)";
    html += `<div class="feedback bad">
      <b>${idx+1}. ${item.topic}</b><br>
      <b>Vraag:</b> ${item.q}<br>
      <b>Jou antwoord:</b> ${userAns}<br>
      <b>Regte antwoord:</b> ${item.answer} ${item.unit || ""}<br>
      <b>Formule:</b> ${item.formula}<br>
      <b>Stappe:</b><br>${item.steps.map((s,i)=>(i+1)+". "+s).join("<br>")}
    </div>`;
  });
  html += `</div>`;
  document.getElementById("review").innerHTML = html;
}

// TEAE_NO_CHEAT_FINISH_GUARD_V1
function teaeUnansweredCount(){
  try {
    return questions.filter(q => {
      const k = qKey(q);
      return !Object.prototype.hasOwnProperty.call(answers, k) ||
        String(answers[k] ?? "").trim() === "";
    }).length;
  } catch(e) {
    return 0;
  }
}

function teaeShowNoCheatMessage(){
  const left = teaeUnansweredCount();
  const status = document.getElementById("status");
  if(status){
    status.innerHTML = `<span style="display:inline-block;background:#fee2e2;color:#7f1d1d;border:2px solid #ef4444;border-radius:999px;padding:10px 16px;font-weight:1000">⛔ Jy kan nie antwoorde kyk voor die toets klaar is nie. Nog uitstaande in hierdie toets: ${left}</span>`;
  }
}

document.addEventListener("click", function(e){
  const txt = String((e.target && e.target.textContent) || "").trim().toLowerCase();
  if(txt.includes("klaar met toets") || txt.includes("done with test")){
    const left = teaeUnansweredCount();
    if(left > 0){
      e.preventDefault();
      e.stopPropagation();
      e.stopImmediatePropagation();
      teaeShowNoCheatMessage();
      return false;
    }
  }
}, true);

function teaeNeedWhatsappAfterDone(done){
  try {
    if(done <= 0) return false;
    if(done % 10 !== 0) return false;
    const testId = String(questions.map(q => qKey(q)).join("|")).slice(0,120);
    const key = "teae_wa_sent_" + testId + "_" + done;
    return localStorage.getItem(key) !== "yes";
  } catch(e) { return false; }
}

function teaeMarkWhatsappSent(done){
  try {
    const testId = String(questions.map(q => qKey(q)).join("|")).slice(0,120);
    const key = "teae_wa_sent_" + testId + "_" + done;
    localStorage.setItem(key, "yes");
  } catch(e) {}
}

// TEAE_WHATSAPP_LAST10_DETAILS_V3
function teaeCleanText(v){
  return String(v ?? "")
    .replace(/<[^>]*>/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function teaeLastAnsweredQuestionDetails(limit){
  try {
    const answered = questions
      .map((q, idx) => ({ q, idx }))
      .filter(x => {
        const k = qKey(x.q);
        return Object.prototype.hasOwnProperty.call(answers, k) &&
          String(answers[k] ?? "").trim() !== "";
      });

    const last = answered.slice(-limit);

    return last.map(x => {
      const q = x.q;
      const k = qKey(q);
      const given = String(answers[k] ?? "").trim();
      const correct = String(q.answer ?? "").trim();
      const ok = isCorrect(given, q.answer);

      return `${x.idx + 1}. ${ok ? "✅ REG" : "❌ VERKEERD"}
Afdeling: ${q.topic || q.unit || ""}
Vraag: ${teaeCleanText(q.q)}
Enrico: ${given}
Regte antwoord: ${correct}`;
    }).join("\n\n");
  } catch(e) {
    return "Kon nie vraag-detail lees nie.";
  }
}

<script>
(function(){
  let mathStarted = false;

  function txt(el){
    return String((el && (el.innerText || el.textContent)) || "").toLowerCase().replace(/\s+/g," ").trim();
  }

  function findDashboard(){
    const all = Array.from(document.querySelectorAll("section,div,main"));
    let best = null;

    for(const el of all){
      const t = txt(el);
      if(
        t.includes("wiskunde adaptiewe leerbank") &&
        t.includes("vrae in groot bank") &&
        t.includes("begin volgende oefensessie")
      ){
        if(!best || t.length < txt(best).length){
          best = el;
        }
      }
    }

    return best;
  }

  function isInsideDashboard(el){
    const dash = findDashboard();
    return dash && (dash === el || dash.contains(el));
  }

  function hideOriginalMath(){
    if(mathStarted) return;

    const killTexts = [
      "graad 10 wiskunde kwartaal 2",
      "kies afdeling",
      "finansiële dokumente",
      "fakture en vat",
      "vraag 1 van",
      "eksamen-styl",
      "bemeester:",
      "uitstaande:",
      "verkeerd hierdie toets",
      "hierdie toets:",
      "lees die dokument/prent",
      "klaar met toets"
    ];

    const all = Array.from(document.querySelectorAll("body > *, main, section, div, header"));

    all.forEach(function(el){
      if(isInsideDashboard(el)) return;

      const t = txt(el);
      if(!t) return;

      const shouldHide = killTexts.some(k => t.includes(k));

      if(shouldHide){
        el.setAttribute("data-teae-math-hidden", "1");
        el.style.display = "none";
      }
    });

    const dash = findDashboard();
    if(dash){
      dash.style.display = "";
      let p = dash;
      while(p && p !== document.body){
        p.style.display = "";
        p = p.parentElement;
      }
    }
  }

  function showOriginalMath(){
    mathStarted = true;

    document.querySelectorAll('[data-teae-math-hidden="1"]').forEach(function(el){
      el.style.display = "";
      el.removeAttribute("data-teae-math-hidden");
    });

    const dash = findDashboard();
    if(dash){
      dash.style.display = "none";
    }
  }

  function clickOriginalRound(){
    showOriginalMath();

    setTimeout(function(){
      const buttons = Array.from(document.querySelectorAll("button,a"));

      // BELANGRIK: "Begin vars ronde" moet eerste wees.
      // "Begin nuwe toets" gee al 547 vrae, so moenie hom eerste klik nie.
      const original =
        buttons.find(b => !isInsideDashboard(b) && txt(b).includes("begin vars ronde")) ||
        buttons.find(b => !isInsideDashboard(b) && txt(b).includes("volgende toets: net verkeerdes")) ||
        buttons.find(b => !isInsideDashboard(b) && txt(b).includes("random"));

      if(original){
        try { original.click(); } catch(e) {}
      }

      setTimeout(function(){ window.scrollTo(0,0); }, 300);
    }, 350);
  }

  function clickOriginalWrongOnly(){
    showOriginalMath();

    setTimeout(function(){
      const b = Array.from(document.querySelectorAll("button,a")).find(x =>
        !isInsideDashboard(x) && txt(x).includes("volgende toets: net verkeerdes")
      );
      if(b) b.click();

      setTimeout(function(){ window.scrollTo(0,0); }, 300);
    }, 350);
  }

  function clickOriginalRandom(){
    showOriginalMath();

    setTimeout(function(){
      const b = Array.from(document.querySelectorAll("button,a")).find(x =>
        !isInsideDashboard(x) && txt(x) === "random"
      );
      if(b) b.click();

      setTimeout(function(){ window.scrollTo(0,0); }, 300);
    }, 350);
  }

  function patchDashboardButtons(){
    const dash = findDashboard();
    if(!dash) return;

    const buttons = Array.from(dash.querySelectorAll("button,a"));

    buttons.forEach(function(btn){
      const t = txt(btn);

      if(t.includes("begin volgende oefensessie") || t.includes("begin volgende")){
        btn.onclick = function(e){
          e.preventDefault();
          e.stopPropagation();
          clickOriginalRound();
        };
      }

      if(t.includes("net verkeerde vrae")){
        btn.onclick = function(e){
          e.preventDefault();
          e.stopPropagation();
          clickOriginalWrongOnly();
        };
      }

      if(t === "random"){
        btn.onclick = function(e){
          e.preventDefault();
          e.stopPropagation();
          clickOriginalRandom();
        };
      }

      if(t.includes("terug hoofkieslys")){
        btn.onclick = function(e){
          e.preventDefault();
          window.location.href = "index.html";
        };
      }
    });
  }

  document.addEventListener("DOMContentLoaded", function(){
    let tries = 0;

    const timer = setInterval(function(){
      tries++;
      patchDashboardButtons();
      hideOriginalMath();

      if(tries > 30){
        clearInterval(timer);
      }
    }, 250);
  });
})();
</script>
